<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="images/round%20logo.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FutureTime</title>
  <!-- Open Graph / Social Media -->
  <meta property="og:title" content="FutureTime — Israel & Japan Shaping the Future of Aging" />
  <meta property="og:description" content="A leadership program uniting cross-sector leaders to promote collaboration for optimal aging in Israel." />
  <meta property="og:image" content="https://mashutkaru.github.io/future-time/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="FutureTime — leadership program on aging innovation connecting Israel and Japan" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://mashutkaru.github.io/future-time/" />
  <style>
    :root { --nav-yellow: #fecf17; --nav-purple: #8837be; --nav-bg: #2a2d71; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; min-height: 100vh; overflow-x: hidden; }
    nav {
      display: flex; align-items: center; padding: 12px 48px;
      background: var(--nav-bg); color: white;
      position: sticky; top: 0; z-index: 100;
    }
    nav::after {
      content: ''; position: absolute; left: 0; right: 0; bottom: 0; height: 3px;
      background: var(--nav-purple);
    }
    nav .logo { display: flex; align-items: center; flex: 1; }
    nav .logo img { height: 48px; object-fit: contain; }
    nav .logo .logo-mobile, nav .logo-right .logo-mobile { display: none; }
    nav .nav-buttons { display: flex; gap: 8px; justify-content: center; flex: 2; }
    nav .logo-right { display: flex; align-items: center; justify-content: flex-end; flex: 1; }
    nav .logo-right img { height: 48px; object-fit: contain; }
    nav button {
      background: transparent; color: rgba(255,255,255,0.9); border: none;
      border-radius: 999px; padding: 10px 24px; font-weight: 500; font-size: 15px;
      cursor: pointer; font-family: inherit; transition: all 0.2s;
    }
    nav button:hover { background: var(--nav-yellow); color: var(--nav-bg); font-weight: 700; }
    nav button.active { background: var(--nav-yellow); color: var(--nav-bg); font-weight: 800; }
    #about-page, #participants-page, #team-page { display: none; }
    #about-page.active, #participants-page.active, #team-page.active { display: block; }

    /* Mobile / tablet responsive - applies below 900px */
    @media (max-width: 900px) {
      nav { padding: 10px 12px !important; flex-wrap: nowrap; gap: 6px; justify-content: space-between; align-items: center; }
      nav .logo { display: flex !important; flex: 0 0 auto; }
      nav .logo .logo-desktop { display: none !important; }
      nav .logo .logo-mobile { display: block !important; height: 36px; object-fit: contain; }
      nav .logo-right { flex: 0 0 auto; }
      nav .logo-right .logo-desktop { display: none !important; }
      nav .logo-right .logo-mobile { display: block !important; height: 36px; object-fit: contain; }
      nav .nav-buttons { flex: 1; justify-content: center; gap: 4px; min-width: 0; }
      nav button { padding: 8px 10px !important; font-size: 12px !important; min-height: 40px; }
    }
    .about-content { max-width: 1100px; margin: 0 auto; padding: 48px 32px 64px; }
    .about-box { background: #2a2d71; border-radius: 20px; padding: 40px 48px; color: white; }
    .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: start; }
    .participants-content { max-width: 1300px; margin: 0 auto; padding: 52px 48px 28px; }
    .stats-bar-wrap { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(265px, 1fr)); gap: 0; }
    .team-content { max-width: 1200px; margin: 0 auto; padding: 48px 24px 64px; }
    .team-card-masha { order: 1; }
    .team-card-hadas { order: 2; }
    .participants-header-wrap { padding-bottom: 52px !important; }
    .stats-bar-wrap { bottom: -90px !important; }
    .sector-btn { overflow: visible; }
    .stats-bar-wrap { display: grid !important; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .participant-card .card-front { gap: 0; }
    .participant-card .card-photo-wrap { margin-bottom: 4px; }
    @media (max-width: 900px) {
      .about-content { padding: 20px 16px 40px !important; max-width: 100%; }
      #about-page .about-box, #about-page .about-grid > div { min-width: 0; }
      .about-box { padding: 24px 20px !important; }
      .about-box p { font-size: 15px !important; line-height: 1.75 !important; }
      .about-grid { display: flex !important; flex-direction: column !important; gap: 24px !important; }
      .about-grid .about-col-ja { border-left: none !important; border-top: 1px solid rgba(255,255,255,0.35) !important; padding-left: 0 !important; padding-top: 24px !important; }
      .about-cta button { width: 100%; max-width: 280px; padding: 14px 20px !important; font-size: 15px !important; }
      .participants-header-wrap { padding: 24px 16px 24px !important; }
      .participants-header-wrap > div { justify-content: center; text-align: center; }
      .participants-header-wrap h1 { font-size: 20px !important; flex-wrap: wrap; justify-content: center; }
      .participants-header-wrap p { font-size: 13px !important; text-align: center; }
      .participants-content { padding: 148px 16px 24px !important; }
      .stats-bar-wrap { padding: 0 16px !important; gap: 8px !important; top: 100% !important; margin-top: 16px !important; bottom: auto !important; left: 50% !important; transform: translateX(-50%) !important; display: grid !important; grid-template-columns: repeat(3, 1fr) !important; }
      .stats-bar-wrap button { padding: 8px 6px !important; min-height: 58px; min-width: 0; flex-direction: column !important; }
      .stats-bar-wrap button > span:last-child { font-size: 10px !important; line-height: 1.15 !important; }
      .stats-bar-wrap button > span:first-child span:last-child { font-size: 12px !important; }
      .search-row { flex-direction: column !important; align-items: stretch !important; gap: 8px !important; margin-bottom: 8px !important; padding: 4px 0 !important; margin-top: 8px !important; }
      .search-row input { min-width: 0 !important; max-width: none !important; width: 100% !important; }
      .search-row #search-count { text-align: center; }
      .cards-grid { grid-template-columns: 1fr !important; gap: 16px !important; padding: 0 !important; margin-top: 0 !important; }
      .participant-card { height: 360px !important; min-height: 360px !important; margin: 0 !important; }
      .participant-card .card-front > div:first-child { height: 45% !important; min-height: 140px !important; }
      .participant-card .card-photo-wrap { margin-bottom: 8px !important; }
      .team-content { padding: 28px 16px 48px !important; }
      .team-content h1 { font-size: 26px !important; margin-bottom: 28px !important; }
      .team-cards { gap: 28px !important; padding: 0 8px; display: flex !important; flex-direction: column !important; }
      .team-card { max-width: 100% !important; }
      .team-card .team-photo { height: 240px !important; }
      .team-card .team-bio { padding: 24px 20px !important; }
      .team-card h2 { font-size: 20px !important; }
    }
    @media (min-width: 500px) and (max-width: 900px) {
      .cards-grid { grid-template-columns: repeat(2, 1fr) !important; }
      .participant-card { height: 380px !important; min-height: 380px !important; }
    }
    @media (min-width: 901px) {
      .participants-content { padding-top: 98px !important; }
      .team-cards { flex-direction: row !important; flex-wrap: nowrap !important; justify-content: center !important; }
      .team-card-hadas { order: 1 !important; }
      .team-card-masha { order: 2 !important; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="logo">
      <img src="og-image.png" class="logo-desktop" alt="FutureTime" />
      <img src="images/mobile-logo-en.png" class="logo-mobile" alt="FutureTime" />
    </div>
    <div class="nav-buttons">
      <button data-page="about" class="nav-btn">About</button>
      <button data-page="participants" class="nav-btn">Participants</button>
      <button data-page="team" class="nav-btn">Meet the Team</button>
    </div>
    <div class="logo-right">
      <img src="images/navbar-logo.png" class="logo-desktop" alt="FutureTime" />
      <img src="images/mobile-logo-he.png" class="logo-mobile" alt="FutureTime" />
    </div>
  </nav>

  <main id="app">
    <div id="about-page" class="active"></div>
    <div id="participants-page"></div>
    <div id="team-page"></div>
  </main>

  <script src="script.js?v=3"></script>
</body>
</html>
