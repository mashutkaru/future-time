<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="images/round%20logo.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FutureTime</title>
  <!-- Open Graph / Social Media -->
  <meta property="og:title" content="FutureTime — Where Israel & Japan Shape the Future of Aging" />
  <meta property="og:description" content="A leadership program uniting cross-sector leaders to advance collaborative solutions for optimal aging in Israel." />
  <meta property="og:image" content="https://mashutkaru.github.io/future-time/images/round-logo.png" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://mashutkaru.github.io/future-time/" />
  <style>
    :root { --nav-yellow: #fecf17; --nav-purple: #8837be; --nav-bg: #2a2d71; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; min-height: 100vh; }
    nav {
      display: flex; align-items: center; padding: 12px 48px;
      background: var(--nav-bg); color: white;
      position: sticky; top: 0; z-index: 100;
    }
    nav::after {
      content: ''; position: absolute; left: 0; right: 0; bottom: 0; height: 3px;
      background: var(--nav-purple);
    }
    nav .logo { display: flex; align-items: center; gap: 12px; }
    nav .logo svg { height: 48px; }
    nav .nav-buttons { display: flex; gap: 8px; margin-left: auto; }
    nav button {
      background: transparent; color: rgba(255,255,255,0.9); border: none;
      border-radius: 999px; padding: 10px 24px; font-weight: 500; font-size: 15px;
      cursor: pointer; font-family: inherit; transition: all 0.2s;
    }
    nav button:hover { background: var(--nav-yellow); color: var(--nav-bg); font-weight: 700; }
    nav button.active { background: var(--nav-yellow); color: var(--nav-bg); font-weight: 800; }
    #about-page, #participants-page, #team-page { display: none; }
    #about-page.active, #participants-page.active, #team-page.active { display: block; }
  </style>
</head>
<body>
  <nav>
    <div class="logo"><img src="logo.png" alt="FutureTime" style="height:48px;display:block" /></div>
    <div class="nav-buttons">
      <button data-page="about" class="nav-btn">About</button>
      <button data-page="participants" class="nav-btn">Participants</button>
      <button data-page="team" class="nav-btn">Meet the Team</button>
    </div>
  </nav>

  <main id="app">
    <div id="about-page" class="active"></div>
    <div id="participants-page"></div>
    <div id="team-page"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
